<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Shauna's Sculpt</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#FFF5F8" />
<meta name="apple-mobile-web-app-title" content="Shauna's Sculpt" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<style>
  :root {
    --pink: #E8698F;
    --pink-dark: #AE375C;
    --pink-soft: #FBD9E6;
    --pink-bg: #FFF7FA;
    --card: #FFFFFF;
    --border: #F3DDE6;
    --ink: #26262C;
    --ink-soft: #4C4C55;
    --ink-muted: #756D78;
    --green: #4CAF7D;
    --green-bg: #E4F5EC;
    --shadow: 0 6px 20px rgba(174, 55, 92, 0.10);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--pink-bg);
    color: var(--ink);
    overscroll-behavior-y: none;
    font-size: 16px;
    line-height: 1.5;
  }
  #app { display: flex; flex-direction: column; min-height: 100vh; }
  #content {
    flex: 1;
    padding: max(16px, env(safe-area-inset-top)) 16px 100px 16px;
    max-width: 560px;
    width: 100%;
    margin: 0 auto;
  }
  h1.page-title { font-size: 30px; font-weight: 800; margin: 4px 0 4px 0; letter-spacing: -0.4px; }
  .brand {
    text-align: center; font-size: 13px; font-weight: 800; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--pink-dark); margin: 2px 0 16px 0;
  }
  .brand span { letter-spacing: normal; }
  p.page-sub { color: var(--ink-soft); font-size: 16px; margin: 0 0 20px 0; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 4px 14px rgba(174, 55, 92, 0.08);
  }
  .hero-card {
    background: linear-gradient(135deg, #FFEDF4, #FBD9E6);
    border: none;
  }
  .row { display: flex; align-items: center; gap: 10px; }
  .row.between { justify-content: space-between; }
  .row.wrap { flex-wrap: wrap; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .stat-pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
  }
  .stat-pill .label { font-size: 11px; font-weight: 700; letter-spacing: 0.4px; color: var(--ink-muted); text-transform: uppercase; }
  .stat-pill .value { font-size: 22px; font-weight: 800; margin-top: 2px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    color: #fff; border: none; border-radius: 999px;
    padding: 15px 24px; font-size: 16px; font-weight: 700;
    cursor: pointer; width: 100%;
    min-height: 48px;
  }
  .btn.secondary {
    background: var(--pink-soft); color: var(--pink-dark);
  }
  .btn.outline {
    background: transparent; color: var(--pink-dark); border: 1.5px solid var(--pink);
  }
  .btn.small { padding: 10px 18px; font-size: 15px; width: auto; min-height: 42px; }
  .btn.ghost { background: transparent; color: var(--ink-soft); }
  .progress-track {
    height: 10px; border-radius: 999px; background: var(--pink-soft); overflow: hidden;
  }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--pink-dark)); border-radius: 999px; transition: width .3s ease; }
  .ring-wrap { position: relative; width: 88px; height: 88px; flex-shrink: 0; }
  .ring-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .ring-label b { font-size: 16px; }
  .ring-label span { font-size: 10px; color: var(--ink-muted); }
  input, textarea {
    font-family: inherit; background: var(--pink-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px; font-size: 16px; color: var(--ink); width: 100%;
  }
  input:focus, textarea:focus { outline: 2px solid var(--pink-soft); border-color: var(--pink); }
  .week-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; }
  .week-chip {
    flex-shrink: 0; width: 50px; height: 50px; border-radius: 25px; display: flex;
    align-items: center; justify-content: center; font-weight: 700; font-size: 16px;
    background: var(--card); border: 1px solid var(--border); color: var(--ink); cursor: pointer;
  }
  .week-chip.active { background: var(--pink); color: #fff; border-color: var(--pink); }
  .day-card { margin-bottom: 12px; }
  .day-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .day-icon {
    width: 46px; height: 46px; border-radius: 14px; background: var(--pink-soft);
    display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 12px;
  }
  .day-icon.done { background: var(--green-bg); }
  .day-dot {
    width: 36px; height: 36px; border-radius: 18px; margin: 0 auto;
    background: var(--pink-bg); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; color: #fff;
  }
  .day-dot.done { background: var(--green); border-color: var(--green); }
  .day-dot.today-dot { border-color: var(--pink); }
  .exercise-row { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; }
  .exercise-title { font-weight: 700; font-size: 16px; }
  .exercise-target { font-size: 14px; color: var(--ink-muted); margin-bottom: 10px; }
  .set-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .set-row .setnum { width: 20px; font-size: 14px; color: var(--ink-muted); }
  .set-row input { text-align: center; padding: 11px 4px; font-size: 16px; }
  .check-btn {
    width: 42px; height: 42px; border-radius: 21px; border: none; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; background: var(--pink-soft); color: var(--pink-dark); font-size: 18px; cursor: pointer;
  }
  .check-btn.done { background: var(--green); color: #fff; }
  .badge {
    display: inline-block; background: var(--pink-soft); color: var(--pink-dark);
    font-size: 11px; font-weight: 700; letter-spacing: 0.4px; padding: 4px 11px; border-radius: 999px; text-transform: uppercase;
  }
  .tag {
    display: inline-block; background: var(--pink-bg); border: 1px solid var(--border); color: var(--ink-soft);
    font-size: 11px; padding: 3px 9px; border-radius: 999px; margin: 0 4px 4px 0;
  }
  #tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--border);
    display: flex; padding: 8px 6px max(8px, env(safe-area-inset-bottom)) 6px; z-index: 10;
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none;
    color: var(--ink-muted); font-size: 11px; font-weight: 600; padding: 8px 0; cursor: pointer;
  }
  .tab-btn.active { color: var(--pink-dark); }
  .tab-icon { width: 24px; height: 24px; }
  .tab-icon svg { width: 24px; height: 24px; display: block; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
  h3.section-title { font-size: 18px; font-weight: 800; margin: 0 0 12px 0; }
  .empty-hint { color: var(--ink-muted); font-size: 15px; padding: 6px 0; }
  .quote-card {
    background: linear-gradient(135deg, var(--pink-soft), #FDEDF3);
    border-radius: 20px; padding: 18px; font-style: italic; font-weight: 700; font-size: 16px; color: var(--pink-dark);
    margin-bottom: 16px;
  }
  a.link { color: var(--pink-dark); font-weight: 700; text-decoration: none; }
  .toast {
    position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 999px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: opacity .25s ease; z-index: 20;
  }
  .toast.show { opacity: 0.95; }
  .install-steps { font-size: 13px; color: var(--ink-soft); line-height: 1.6; }
  canvas { width: 100%; height: 140px; display: block; }

  /* Rest timer bar */
  #rest-timer {
    position: fixed; left: 12px; right: 12px; bottom: 86px; z-index: 15;
    background: var(--ink); color: #fff; border-radius: 16px;
    padding: 12px 16px; display: none; align-items: center; gap: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  #rest-timer.show { display: flex; animation: fadeUp .25s ease both; }
  #rest-timer .rt-label { font-size: 14px; font-weight: 600; }
  #rest-timer b { font-size: 22px; font-variant-numeric: tabular-nums; flex: 1; text-align: center; }
  #rest-timer button {
    background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 999px;
    padding: 8px 14px; font-size: 14px; font-weight: 700; cursor: pointer;
  }

  /* Confetti */
  .confetti {
    position: fixed; top: -14px; width: 10px; height: 14px; border-radius: 2px; z-index: 60;
    animation: confetti-fall 1.9s ease-in forwards; pointer-events: none;
  }
  @keyframes confetti-fall {
    to { transform: translateY(105vh) rotate(720deg); opacity: 0.85; }
  }

  /* Page transitions + touch feel */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  #content > * { animation: fadeUp .28s ease both; }
  .btn:active, .check-btn:active, .week-chip:active { transform: scale(0.96); }
  .btn, .check-btn, .week-chip { transition: transform .12s ease; }

  /* Onboarding overlay */
  #onboarding {
    position: fixed; inset: 0; z-index: 40; background: var(--pink-bg);
    overflow-y: auto; padding: max(28px, env(safe-area-inset-top)) 20px 40px 20px;
  }
  #onboarding .inner { max-width: 480px; margin: 0 auto; }

  /* Dark mode (follows the phone automatically) */
  @media (prefers-color-scheme: dark) {
    :root {
      --pink-bg: #1C1318;
      --card: #291E24;
      --border: #3E2C35;
      --ink: #F5EDF1;
      --ink-soft: #CDBFC7;
      --ink-muted: #9C8C95;
      --pink-soft: #4A2A38;
      --green-bg: #1F3A2C;
      --shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    #tabbar { background: #241A20; border-top-color: var(--border); }
    .card { box-shadow: 0 4px 14px rgba(0,0,0,0.3); }
    .hero-card { background: linear-gradient(135deg, #3A2330, #4A2A38); }
    .quote-card { background: linear-gradient(135deg, #3A2330, #33202B); color: #F3BCD2; }
    .badge { background: var(--pink-soft); color: #F3BCD2; }
    .toast { background: #000; }
  }
</style>
</head>
<body>
  <div id="app">
    <main id="content"></main>
    <nav id="tabbar">
      <button class="tab-btn" data-tab="home"><span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M10 21v-6h4v6"/></svg></span>Home</button>
      <button class="tab-btn" data-tab="workout"><span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M7.5 12h9"/><rect x="4" y="7.5" width="3" height="9" rx="1.2"/><rect x="17" y="7.5" width="3" height="9" rx="1.2"/><path d="M2 10v4M22 10v4"/></svg></span>Workout</button>
      <button class="tab-btn" data-tab="progress"><span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M4 20V4"/><path d="M4 20h16"/><path d="M7 15l4-5 3 3 5-7"/></svg></span>Progress</button>
      <button class="tab-btn" data-tab="nutrition"><span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M12 21c-4.5 0-7-3.5-7-7 0-3 2-5 4.5-5 1 0 1.8.3 2.5.8.7-.5 1.5-.8 2.5-.8C17 9 19 11 19 14c0 3.5-2.5 7-7 7Z"/><path d="M12 9V6.5C12 5 13 4 14.5 4"/></svg></span>Nutrition</button>
      <button class="tab-btn" data-tab="profile"><span class="tab-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4.5 20c1.2-3.2 4-5 7.5-5s6.3 1.8 7.5 5"/></svg></span>Profile</button>
    </nav>
  </div>
  <div class="toast" id="toast"></div>
  <div id="rest-timer">
    <span class="rt-label">⏱ Rest</span>
    <b id="rest-time">1:30</b>
    <button id="rest-plus" type="button">+30s</button>
    <button id="rest-skip" type="button">Skip</button>
  </div>

<script>
/* ============================= PROGRAM DATA ============================= */
const PROGRAM_DAYS = ["Monday", "Tuesday", "Thursday", "Friday", "Saturday"];

const DEFAULT_PROGRAM = {
  Monday: {
    title: "Heavy Glutes & Hamstrings",
    warmup: ["Incline Walk – 5 min", "Banded Walks – 2x15", "Glute Bridges – 2x15", "Frog Pumps – 2x20"],
    exercises: [
      { name: "Barbell Hip Thrust", sets: 4, reps: "8", track: true },
      { name: "Romanian Deadlift", sets: 4, reps: "8-10", track: true },
      { name: "Bulgarian Split Squat", sets: 3, reps: "10 each leg", track: true },
      { name: "Seated Hamstring Curl", sets: 3, reps: "12", track: true },
      { name: "Cable Kickbacks", sets: 3, reps: "15", track: true },
      { name: "45° Back Extensions", sets: 3, reps: "12", track: true },
    ],
  },
  Tuesday: {
    title: "Upper Body",
    warmup: [],
    exercises: [
      { name: "Lat Pulldown", sets: 3, reps: "10", track: true },
      { name: "Seated Row", sets: 3, reps: "10", track: true },
      { name: "Shoulder Press", sets: 3, reps: "10", track: true },
      { name: "Chest Press", sets: 3, reps: "10", track: true },
      { name: "Lateral Raises", sets: 3, reps: "12", track: true },
      { name: "Biceps Curl", sets: 3, reps: "12", track: true },
      { name: "Triceps Pushdown", sets: 3, reps: "12", track: true },
    ],
  },
  Thursday: {
    title: "Glutes & Quads",
    warmup: ["Monster Walks – 2x15", "Glute Bridges – 2x15"],
    exercises: [
      { name: "Hip Thrust Machine", sets: 4, reps: "12", track: true },
      { name: "Single Leg Hip Thrust", sets: 3, reps: "12 each leg", track: true },
      { name: "Smith Machine Squat", sets: 4, reps: "8-10", track: true },
      { name: "Leg Press", sets: 3, reps: "12", track: true },
      { name: "Walking Lunges", sets: 3, reps: "12 each leg", track: true },
      { name: "Cable Abduction", sets: 3, reps: "20", track: true },
      { name: "Leg Extension", sets: 3, reps: "15", track: true },
    ],
  },
  Friday: {
    title: "Upper Body",
    warmup: [],
    exercises: [
      { name: "Assisted Pull Ups", sets: 3, reps: "10", track: true },
      { name: "Single Arm Row", sets: 3, reps: "10 each arm", track: true },
      { name: "Face Pull", sets: 3, reps: "15", track: true },
      { name: "Incline Dumbbell Press", sets: 3, reps: "10", track: true },
      { name: "Shoulder Press (DB)", sets: 3, reps: "10", track: true },
      { name: "Core Circuit", sets: 3, reps: "15", track: false },
    ],
  },
  Saturday: {
    title: "Glute Pump Day",
    warmup: [],
    exercises: [
      { name: "Hip Thrust (Circuit, x4)", sets: 4, reps: "15", track: true },
      { name: "Banded Abductions (x4)", sets: 4, reps: "30", track: false },
      { name: "Cable Kickbacks (Circuit, x3)", sets: 3, reps: "15 each leg", track: true },
      { name: "Cable Abduction (Circuit, x3)", sets: 3, reps: "15 each leg", track: true },
      { name: "Frog Pumps (Circuit, x3)", sets: 3, reps: "30", track: false },
      { name: "Dumbbell RDL (Circuit, x3)", sets: 3, reps: "15", track: true },
    ],
  },
};

const QUOTES = {
  1: "Strong glutes, strong life. Week 1 is about laying the foundation.",
  2: "Progress, not perfection. Just show up today.",
  3: "Every rep builds the body you're working for.",
  4: "Consistency beats intensity. Keep stacking days.",
  5: "You are stronger than you were four weeks ago.",
  6: "Halfway there. Trust the process.",
  7: "Growth happens when you push past comfortable.",
  8: "Small weekly wins add up to big transformations.",
  9: "Your only competition is who you were last week.",
  10: "Discipline is choosing what you want most.",
  11: "Almost there. Finish this week strong.",
  12: "12 weeks of work. A lifetime of strength. Well done.",
};

/* ============================= STATE ============================= */
const STORAGE_KEY = "glute-gains-simple-v1";

function defaultState() {
  return {
    name: "Shauna",
    currentWeek: 1,
    goals: { weightKg: null, goalWeightKg: null, hipThrustKg: null, goalHipThrustKg: null, proteinTarget: 130, waterTarget: 2.5 },
    program: JSON.parse(JSON.stringify(DEFAULT_PROGRAM)), // user-editable copy of the program
    logs: {},          // key "week-day" -> { exercises: { exerciseKey: { sets:[{weight,reps,completed}] } }, dayCompleted }
    measurements: [],  // { date, weight, waist, hips }
    nutrition: {},      // date -> { calories, protein, water }
    openDay: null,
    onboarded: false,
    settings: { restSeconds: 90 },
  };
}

function exerciseKey(name) {
  return (name || "").toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "") || "exercise";
}

let state = load();

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const merged = Object.assign(defaultState(), parsed);
    if (!merged.name) merged.name = "Shauna";
    return merged;
  } catch (e) {
    return defaultState();
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function dayKey(week, day) { return week + "-" + day; }

function getDayLog(week, day) {
  const key = dayKey(week, day);
  const template = state.program[day];
  if (!state.logs[key]) state.logs[key] = { exercises: {}, dayCompleted: false };
  const log = state.logs[key];
  // Reconcile against the current (possibly just-edited) program so renamed/added/resized
  // exercises always have a matching log entry, without ever destroying existing data.
  template.exercises.forEach(ex => {
    const k = exerciseKey(ex.name);
    if (!log.exercises[k]) {
      log.exercises[k] = { sets: Array.from({ length: ex.sets }, () => ({ weight: null, reps: null, completed: false })) };
    } else {
      while (log.exercises[k].sets.length < ex.sets) log.exercises[k].sets.push({ weight: null, reps: null, completed: false });
    }
  });
  return log;
}

function completedExerciseCount(week, day) {
  const log = getDayLog(week, day);
  const template = state.program[day];
  return template.exercises.filter(ex => {
    const loggedEx = log.exercises[exerciseKey(ex.name)];
    return loggedEx && loggedEx.sets.every(s => s.completed);
  }).length;
}

function isDayFullyLogged(week, day) {
  const log = getDayLog(week, day);
  const template = state.program[day];
  return template.exercises.every(ex => {
    const loggedEx = log.exercises[exerciseKey(ex.name)];
    return loggedEx && loggedEx.sets.every(s => s.completed);
  });
}

function todayISO() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function todayDayName() {
  return ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()];
}

function bestWeightForExercise(exerciseName) {
  return bestWeightForKey(exerciseKey(exerciseName));
}

function bestWeightForKey(k) {
  let best = null;
  Object.values(state.logs).forEach(log => {
    const loggedEx = log.exercises[k];
    if (!loggedEx) return;
    loggedEx.sets.forEach(s => {
      if (s.completed && s.weight != null && (best === null || s.weight > best)) best = s.weight;
    });
  });
  return best;
}

function exerciseHistory(exerciseName) {
  const points = [];
  const k = exerciseKey(exerciseName);
  for (let week = 1; week <= 12; week++) {
    let maxW = null;
    PROGRAM_DAYS.forEach(day => {
      const key = dayKey(week, day);
      const log = state.logs[key];
      if (!log) return;
      const loggedEx = log.exercises[k];
      if (!loggedEx) return;
      loggedEx.sets.forEach(s => {
        if (s.completed && s.weight != null) maxW = maxW === null ? s.weight : Math.max(maxW, s.weight);
      });
    });
    if (maxW !== null) points.push({ x: "W" + week, y: maxW });
  }
  return points;
}

function weekMaxForExercise(week, exerciseName) {
  if (week < 1) return null;
  const k = exerciseKey(exerciseName);
  let maxW = null;
  PROGRAM_DAYS.forEach(day => {
    const log = state.logs[dayKey(week, day)];
    if (!log) return;
    const ex = log.exercises[k];
    if (!ex) return;
    ex.sets.forEach(s => {
      if (s.completed && s.weight != null) maxW = maxW === null ? s.weight : Math.max(maxW, s.weight);
    });
  });
  return maxW;
}

/* Weekly change per exercise: compares this week's top weight to last week's */
function weeklyGains(week) {
  const seen = new Set();
  const rows = [];
  PROGRAM_DAYS.forEach(day => {
    state.program[day].exercises.forEach(ex => {
      if (!ex.track) return;
      const k = exerciseKey(ex.name);
      if (seen.has(k)) return;
      seen.add(k);
      const thisW = weekMaxForExercise(week, ex.name);
      const lastW = weekMaxForExercise(week - 1, ex.name);
      if (thisW == null && lastW == null) return;
      rows.push({ name: ex.name, thisW, lastW, delta: (thisW != null && lastW != null) ? +(thisW - lastW).toFixed(2) : null });
    });
  });
  return rows;
}

/* How many of the 5 weekly sessions are done */
function sessionsThisWeek(week) {
  return PROGRAM_DAYS.filter(d => {
    const log = state.logs[dayKey(week, d)];
    return log && log.dayCompleted;
  }).length;
}

/* Total kg lifted + completed sets in a week */
function weekVolume(week) {
  let vol = 0, sets = 0;
  PROGRAM_DAYS.forEach(day => {
    const log = state.logs[dayKey(week, day)];
    if (!log) return;
    Object.values(log.exercises).forEach(ex => ex.sets.forEach(s => {
      if (s.completed) { sets++; vol += (s.weight || 0) * (s.reps || 0); }
    }));
  });
  return { vol: Math.round(vol), sets };
}

/* ============================= REST TIMER ============================= */
let restInterval = null, restRemaining = 0;

function startRestTimer(seconds) {
  restRemaining = seconds || (state.settings && state.settings.restSeconds) || 90;
  document.getElementById("rest-timer").classList.add("show");
  updateRestUI();
  clearInterval(restInterval);
  restInterval = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) {
      stopRestTimer();
      showToast("Rest over — go! 💪");
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      beep();
    } else updateRestUI();
  }, 1000);
}

function updateRestUI() {
  document.getElementById("rest-time").textContent =
    Math.floor(restRemaining / 60) + ":" + String(restRemaining % 60).padStart(2, "0");
}

function stopRestTimer() {
  clearInterval(restInterval);
  restInterval = null;
  document.getElementById("rest-timer").classList.remove("show");
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; g.gain.value = 0.12;
    o.start();
    setTimeout(() => { o.stop(); ctx.close(); }, 300);
  } catch (e) {}
}

/* ============================= CELEBRATIONS ============================= */
function confettiBurst() {
  const colors = ["#E8698F", "#AE375C", "#FBD9E6", "#4CAF7D", "#FFD166"];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement("div");
    p.className = "confetti";
    p.style.left = (5 + Math.random() * 90) + "vw";
    p.style.background = colors[i % colors.length];
    p.style.animationDelay = (Math.random() * 0.4) + "s";
    p.style.transform = "rotate(" + Math.floor(Math.random() * 360) + "deg)";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

function currentStreak() {
  const completedDates = new Set();
  Object.entries(state.logs).forEach(([key, log]) => {
    if (log.dayCompleted && log.completedDate) completedDates.add(log.completedDate);
  });
  const dates = Array.from(completedDates).sort().reverse();
  if (!dates.length) return 0;
  let streak = 0;
  let cursor = new Date();
  for (let i = 0; i < 400; i++) {
    const iso = cursor.getFullYear() + "-" + String(cursor.getMonth()+1).padStart(2,"0") + "-" + String(cursor.getDate()).padStart(2,"0");
    if (dates.includes(iso)) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    } else if (streak === 0) {
      cursor.setDate(cursor.getDate() - 1);
      if (i > 0) break;
    } else {
      break;
    }
  }
  return streak;
}

function totalWorkoutsCompleted() {
  return Object.values(state.logs).filter(l => l.dayCompleted).length;
}

/* ============================= RENDER HELPERS ============================= */
function escapeHtml(s) { return (s ?? "").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1600);
}

function ring(progress, size, label, sublabel) {
  const r = (size - 10) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - Math.max(0, Math.min(1, progress)));
  return `
  <div class="ring-wrap" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="#FBD9E6" stroke-width="9" fill="none"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="#E8698F" stroke-width="9" fill="none"
        stroke-dasharray="${c} ${c}" stroke-dashoffset="${off}" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})"/>
    </svg>
    <div class="ring-label"><b>${label}</b>${sublabel ? `<span>${sublabel}</span>` : ""}</div>
  </div>`;
}

function drawLineChart(canvasId, points) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || points.length < 2) return;
  const dpr = window.devicePixelRatio || 1;
  const cssWidth = canvas.clientWidth || 300;
  const cssHeight = 140;
  canvas.width = cssWidth * dpr;
  canvas.height = cssHeight * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, cssWidth, cssHeight);

  const padL = 34, padR = 10, padT = 12, padB = 22;
  const w = cssWidth - padL - padR, h = cssHeight - padT - padB;
  const ys = points.map(p => p.y);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const yRange = maxY - minY || 1;

  ctx.strokeStyle = "#F3DDE6";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = padT + (h / 3) * i;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + w, y); ctx.stroke();
  }
  ctx.fillStyle = "#9A939C"; ctx.font = "10px -apple-system, sans-serif";
  ctx.fillText(maxY.toFixed(0), 2, padT + 4);
  ctx.fillText(minY.toFixed(0), 2, padT + h);

  const stepX = points.length > 1 ? w / (points.length - 1) : 0;
  const coords = points.map((p, i) => ({
    x: padL + stepX * i,
    y: padT + h - ((p.y - minY) / yRange) * h,
  }));

  ctx.strokeStyle = "#E8698F";
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  coords.forEach((c, i) => (i === 0 ? ctx.moveTo(c.x, c.y) : ctx.lineTo(c.x, c.y)));
  ctx.stroke();

  ctx.fillStyle = "#AE375C";
  coords.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 3.5, 0, Math.PI * 2); ctx.fill(); });

  ctx.fillStyle = "#9A939C"; ctx.font = "10px -apple-system, sans-serif"; ctx.textAlign = "center";
  points.forEach((p, i) => ctx.fillText(p.x, coords[i].x, cssHeight - 4));
  ctx.textAlign = "left";
}

function renderNutrition() {
  const today = todayISO();
  const entry = state.nutrition[today] || {};
  const targets = state.goals;
  const last7 = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const iso = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
    if (state.nutrition[iso]) last7.push({ date: iso, ...state.nutrition[iso] });
  }
  const avg = (key) => {
    const vals = last7.map(e => e[key]).filter(v => typeof v === "number");
    if (!vals.length) return null;
    return Math.round((vals.reduce((a,b)=>a+b,0) / vals.length) * 10) / 10;
  };
  const proteinPct = targets.proteinTarget && entry.protein ? Math.min(100, Math.round((entry.protein/targets.proteinTarget)*100)) : 0;
  const waterPct = targets.waterTarget && entry.water ? Math.min(100, Math.round((entry.water/targets.waterTarget)*100)) : 0;

  return `
    <h1 class="page-title">Nutrition</h1>
    <p class="page-sub">${today}</p>

    <div class="card">
      <h3 class="section-title">Today</h3>

        <input type="number" inputmode="numeric" style="width:90px;" value="${entry.protein ?? ""}" data-action="set-nutrition" data-field="protein" placeholder="g"/>
      </div>
      <div class="progress-track" style="margin-bottom:14px;"><div class="progress-fill" style="width:${proteinPct}%;"></div></div>
      <div class="row between" style="margin-bottom:6px;">
        <span style="font-size:14px;">Water (target ${targets.waterTarget}L)</span>
        <input type="number" inputmode="decimal" style="width:90px;" value="${entry.water ?? ""}" data-action="set-nutrition" data-field="water" placeholder="L"/>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${waterPct}%;"></div></div>
    </div>

    <div class="card">
      <h3 class="section-title">7-Day Averages</h3>
      <div class="grid3">

/* ============================= EVENT HANDLING ============================= */
function attachHandlers() {
  const content = document.getElementById("content");

  content.querySelectorAll("[data-action]").forEach(el => {
    const action = el.dataset.action;

    if (action === "go-today") {
      el.onclick = () => {
        const today = todayDayName();
        if (PROGRAM_DAYS.includes(today)) {
          state.openDay = today;
          save();
          setTab("workout");
        }
      };
    }
    if (action === "go-tab") {
      el.onclick = () => setTab(el.dataset.tab);
    }
    if (action === "set-week") {
      el.onclick = () => { state.currentWeek = Number(el.dataset.week); save(); render(); };
    }
    if (action === "open-day") {
      el.onclick = () => {
        state.openDay = el.dataset.day;
        save(); render();
        document.getElementById("content").scrollTop = 0;
        window.scrollTo(0, 0);
      };
    }
    if (action === "back-to-days") {
      el.onclick = () => {
        state.openDay = null;
        save(); render();
        window.scrollTo(0, 0);
      };
    }
    if (action === "toggle-set") {
      el.onclick = () => {
        const { week, day, ex, set } = el.dataset;
        const log = getDayLog(Number(week), day);
        const s = log.exercises[ex].sets[set];
        const completing = !s.completed;
        // Personal best check (before this set counts)
        let isPB = false;
        if (completing && s.weight != null) {
          const prevBest = bestWeightForKey(ex);
          if (prevBest != null && s.weight > prevBest) isPB = true;
        }
        s.completed = completing;
        save(); render();
        if (completing) {
          startRestTimer();
          if (isPB) {
            showToast("New PB — " + s.weight + "kg! 🎉");
            confettiBurst();
          }
        } else {
          stopRestTimer();
        }
      };
    }
    if (action === "set-weight" || action === "set-reps") {
      el.oninput = () => {
        const { week, day, ex, set } = el.dataset;
        const log = getDayLog(Number(week), day);
        const s = log.exercises[ex].sets[set];
        const val = el.value === "" ? null : Number(el.value);
        if (action === "set-weight") s.weight = val; else s.reps = val;
        save();
      };
    }
    if (action === "finish-day") {
      el.onclick = () => {
        const { week, day } = el.dataset;
        const log = getDayLog(Number(week), day);
        log.dayCompleted = true;
        log.completedDate = todayISO();
        save();
        stopRestTimer();
        const done = sessionsThisWeek(Number(week));
        showToast(done >= 5 ? "That's all 5 sessions this week! 🌟🍑" : "Workout logged! 🍑 " + done + " of 5 this week");
        confettiBurst();
        render();
      };
    }
    if (action === "add-measurement") {
      el.onclick = () => {
        const weight = document.getElementById("m-weight").value;
        const waist = document.getElementById("m-waist").value;
        const hips = document.getElementById("m-hips").value;
        if (!weight && !waist && !hips) { showToast("Enter at least one value"); return; }
        state.measurements.push({
          date: todayISO(),
          weight: weight ? Number(weight) : null,
          waist: waist ? Number(waist) : null,
          hips: hips ? Number(hips) : null,
        });
        save();
        showToast("Measurement saved");
        render();
      };
    }
    if (action === "set-nutrition") {
      el.oninput = () => {
        const field = el.dataset.field;
        const today = todayISO();
        if (!state.nutrition[today]) state.nutrition[today] = {};
        state.nutrition[today][field] = el.value === "" ? null : Number(el.value);
        save();
      };
    }
    if (action === "set-goal") {
      el.oninput = () => {
        state.goals[el.dataset.field] = el.value === "" ? null : Number(el.value);
        save();
      };
    }
    if (action === "set-name") {
      el.oninput = () => { state.name = el.value; save(); };
    }
    if (action === "toggle-edit-mode") {
      el.onclick = () => { editMode = !editMode; render(); };
    }
    if (action === "edit-day-title") {
      el.oninput = () => { state.program[el.dataset.day].title = el.value; save(); };
    }
    if (action === "edit-warmup") {
      el.oninput = () => {
        state.program[el.dataset.day].warmup = el.value.split("\n").map(s => s.trim()).filter(Boolean);
        save();
      };
    }
    if (action === "edit-ex-name") {
      el.oninput = () => { state.program[el.dataset.day].exercises[Number(el.dataset.idx)].name = el.value; save(); };
    }
    if (action === "edit-ex-sets") {
      el.oninput = () => {
        const v = Math.max(1, Number(el.value) || 1);
        state.program[el.dataset.day].exercises[Number(el.dataset.idx)].sets = v;
        save();
      };
    }
    if (action === "edit-ex-reps") {
      el.oninput = () => { state.program[el.dataset.day].exercises[Number(el.dataset.idx)].reps = el.value; save(); };
    }
    if (action === "edit-ex-track") {
      el.onchange = () => { state.program[el.dataset.day].exercises[Number(el.dataset.idx)].track = el.checked; save(); };
    }
    if (action === "delete-ex") {
      el.onclick = () => {
        const day = el.dataset.day, idx = Number(el.dataset.idx);
        if (state.program[day].exercises.length <= 1) { showToast("A day needs at least one exercise"); return; }
        if (confirm("Delete this exercise? This applies to all 12 weeks.")) {
          state.program[day].exercises.splice(idx, 1);
          save(); render();
        }
      };
    }
    if (action === "add-ex") {
      el.onclick = () => {
        state.program[el.dataset.day].exercises.push({ name: "New Exercise", sets: 3, reps: "10", track: true });
        save(); render();
        showToast("Exercise added");
      };
    }
    if (action === "reset-program") {
      el.onclick = () => {
        if (confirm("Reset the workout program back to the original 12-week plan? Your logged history, measurements and nutrition stay untouched.")) {
          state.program = JSON.parse(JSON.stringify(DEFAULT_PROGRAM));
          save(); render();
          showToast("Program reset to default");
        }
      };
    }
    if (action === "reset-data") {
      el.onclick = () => {
        if (confirm("This will erase all your logged workouts, measurements and nutrition. Are you sure?")) {
          localStorage.removeItem(STORAGE_KEY);
          state = defaultState();
          state.onboarded = true;
          render();
          showToast("Data reset");
        }
      };
    }
    if (action === "export-data") {
      el.onclick = () => {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "shaunas-sculpt-backup-" + todayISO() + ".json";
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 500);
        showToast("Backup saved 📦");
      };
    }
    if (action === "set-rest") {
      el.oninput = () => {
        if (!state.settings) state.settings = {};
        state.settings.restSeconds = Math.max(10, Number(el.value) || 90);
        save();
      };
    }
    if (action === "finish-onboarding") {
      el.onclick = () => {
        const v = id => { const n = document.getElementById(id); return n && n.value !== "" ? Number(n.value) : null; };
        const nameEl = document.getElementById("ob-name");
        if (nameEl && nameEl.value.trim()) state.name = nameEl.value.trim();
        state.goals.weightKg = v("ob-weight") ?? state.goals.weightKg;
        state.goals.goalWeightKg = v("ob-goal-weight") ?? state.goals.goalWeightKg;
        state.goals.hipThrustKg = v("ob-hip") ?? state.goals.hipThrustKg;
        state.goals.goalHipThrustKg = v("ob-goal-hip") ?? state.goals.goalHipThrustKg;
        state.goals.proteinTarget = v("ob-protein") ?? state.goals.proteinTarget;
        state.goals.waterTarget = v("ob-water") ?? state.goals.waterTarget;
        if (v("ob-weight") != null) state.measurements.push({ date: todayISO(), weight: v("ob-weight"), waist: null, hips: null });
        state.onboarded = true;
        save();
        render();
        confettiBurst();
        showToast("Let's build those glutes! 🍑");
      };
    }
  });

  /* Plate calculator (only present on a workout day page) */
  const pw = document.getElementById("plate-weight");
  if (pw) {
    const calc = () => {
      const total = Number(pw.value);
      const bar = Number(document.getElementById("plate-bar").value);
      const out = document.getElementById("plate-result");
      if (!total) { out.textContent = "Type the total weight to see plates per side."; return; }
      if (total < bar) { out.textContent = "That's lighter than the bar itself."; return; }
      let perSide = (total - bar) / 2;
      const plates = [25, 20, 15, 10, 5, 2.5, 1.25];
      const used = [];
      plates.forEach(p => { while (perSide >= p - 0.001) { used.push(p); perSide -= p; } });
      out.innerHTML = used.length
        ? `Each side: <b>${used.join(" + ")}</b> kg${perSide > 0.01 ? ` <span style="color:var(--ink-muted);">(${perSide.toFixed(2)}kg can't be plated)</span>` : ""}`
        : "Just the bar 🙂";
    };
    pw.oninput = calc;
    document.getElementById("plate-bar").onchange = calc;
  }

  /* Restore from backup (only present on profile page) */
  const rf = document.getElementById("restore-file");
  if (rf) {
    rf.onchange = () => {
      const f = rf.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          if (!parsed || typeof parsed !== "object" || !parsed.program || !("logs" in parsed)) throw new Error("bad file");
          state = Object.assign(defaultState(), parsed);
          state.onboarded = true;
          save(); render();
          showToast("Backup restored ✅");
        } catch (e) {
          showToast("That file doesn't look like a Shauna's Sculpt backup");
        }
      };
      reader.readAsText(f);
    };
  }

  /* Exercise trend picker (only present on progress page) */
  const exPicker = document.getElementById("ex-picker");
  if (exPicker) {
    exPicker.onchange = () => { chartExercise = exPicker.value; render(); };
  }
}

/* ============================= BOOT ============================= */
document.querySelectorAll("#tabbar .tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    // Tapping Workout again while inside a day goes back to the day list
    if (btn.dataset.tab === "workout" && activeTab === "workout" && state.openDay) {
      state.openDay = null;
      save();
    }
    setTab(btn.dataset.tab);
  });
});
setTab("home");

/* Rest timer controls */
document.getElementById("rest-plus").onclick = () => { restRemaining += 30; updateRestUI(); };
document.getElementById("rest-skip").onclick = () => stopRestTimer();

/* Service worker: makes the app work offline once installed */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
